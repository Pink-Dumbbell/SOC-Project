<ossec_config>

  <client>
    <server>
      <address>10.30.30.10</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>

    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
  </client>

  <!-- Rocky SSH 및 인증 로그 -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/host/var/log/secure</location>
  </localfile>

  <!-- Rocky 시스템 로그 -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/host/var/log/messages</location>
  </localfile>

  <!-- auditd 로그 -->
  <localfile>
    <log_format>audit</log_format>
    <location>/host/var/log/audit/audit.log</location>
  </localfile>

  <!-- DVWA Apache 접근 로그 -->
  <localfile>
    <log_format>apache</log_format>
    <location>/apache-logs/access.log</location>
  </localfile>

  <!-- DVWA Apache 오류 로그 -->
  <localfile>
    <log_format>apache</log_format>
    <location>/apache-logs/error.log</location>
  </localfile>

  <!-- 파일 무결성 감시 -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>300</frequency>

    <directories check_all="yes" realtime="yes">/host/etc</directories>
    <directories check_all="yes" realtime="yes">/host/web-files</directories>
  </syscheck>

  <logging>
    <log_format>plain</log_format>
  </logging>

</ossec_config>
