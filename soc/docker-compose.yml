services:
  suricata:
    image: jasonish/suricata:latest
    container_name: ubuntu1-suricata
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - ./suricata/logs:/var/log/suricata
      - ./suricata/rules/local.rules:/etc/suricata/rules/local.rules
    command: -i enp2s0 -S /etc/suricata/rules/local.rules
    restart: unless-stopped

  wazuh-agent:
    image: wazuh/wazuh-agent:4.14.6
    container_name: ubuntu1-wazuh-agent
    hostname: ubuntu1-security-gateway
    network_mode: host
    restart: unless-stopped
    environment:
      - WAZUH_MANAGER_SERVER=${WAZUH_MANAGER_IP:-10.30.30.10}
      - WAZUH_AGENT_NAME=ubuntu1-security-gateway
    volumes:
      - ./wazuh-agent/ossec.conf:/wazuh-config-mount/etc/ossec.conf:ro
      - ./suricata/logs:/suricata/logs:ro
